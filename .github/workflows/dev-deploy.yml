name: Deploy DEV

on:
  push:
    branches:
      - dev

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Repository Structure
        shell: bash
        run: |
          set -e

          echo "Current directory:"
          pwd

          echo "Repository files:"
          find . -maxdepth 3 -type f | sort

          test -d app/frontend
          test -d app/backend

          test -f app/frontend/docker-compose.yml
          test -f app/backend/docker-compose.yml

      - name: Configure SSH
        shell: bash
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.DEV_SSH_PRIVATE_KEY_B64 }}" \
            | base64 --decode \
            > ~/.ssh/github_actions_dev

          chmod 600 ~/.ssh/github_actions_dev

          cat > ~/.ssh/config <<EOF
          Host frontend
            HostName ${{ secrets.DEV_FRONTEND_HOST }}
            User ${{ secrets.DEV_SSH_USER }}
            IdentityFile ~/.ssh/github_actions_dev
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 5

          Host backend
            HostName ${{ secrets.DEV_BACKEND_HOST }}
            User ${{ secrets.DEV_SSH_USER }}
            IdentityFile ~/.ssh/github_actions_dev
            IdentitiesOnly yes
            ProxyJump frontend
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 5
          EOF

          chmod 600 ~/.ssh/config

          ssh-keygen -lf ~/.ssh/github_actions_dev

      - name: Test Frontend SSH
        shell: bash
        run: |
          set -e

          ssh frontend "
            echo 'Frontend SSH connection successful'
            hostname
            whoami
            id
          "

      - name: Test Backend SSH
        shell: bash
        run: |
          set -e

          ssh backend "
            echo 'Backend SSH connection successful'
            hostname
            whoami
            id
          "

      - name: Prepare Frontend Directory
        shell: bash
        run: |
          set -e

          ssh frontend <<'EOF'
          set -e

          sudo mkdir -p /home/rohit/simple-bank-dev/frontend

          sudo chown -R rohitthakur:rohitthakur \
            /home/rohit/simple-bank-dev

          sudo chmod 755 /home/rohit

          sudo chmod -R u+rwX,go+rX \
            /home/rohit/simple-bank-dev

          echo "Frontend deployment directory prepared:"
          ls -ld /home/rohit/simple-bank-dev
          ls -ld /home/rohit/simple-bank-dev/frontend
          EOF

      - name: Sync Frontend Files
        shell: bash
        run: |
          set -e

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            app/frontend/ \
            frontend:/home/rohit/simple-bank-dev/frontend/

      - name: Verify Frontend Files
        shell: bash
        run: |
          set -e

          ssh frontend <<'EOF'
          set -e

          cd /home/rohit/simple-bank-dev/frontend

          echo "Frontend deployment path:"
          pwd

          echo "Frontend files:"
          ls -la

          test -f Dockerfile
          test -f docker-compose.yml
          EOF

      - name: Deploy Frontend
        shell: bash
        run: |
          set -e

          ssh frontend <<'EOF'
          set -e

          cd /home/rohit/simple-bank-dev/frontend

          echo "Stopping existing frontend container..."
          docker compose down || true

          echo "Building and starting frontend..."
          docker compose up -d --build

          echo "Frontend container status:"
          docker compose ps

          echo "Frontend container logs:"
          docker compose logs --tail=50
          EOF

      - name: Prepare Backend Directory
        shell: bash
        run: |
          set -e

          ssh backend <<'EOF'
          set -e

          sudo mkdir -p /opt/simple-bank/backend

          sudo chown -R rohitthakur:rohitthakur \
            /opt/simple-bank

          sudo chmod -R u+rwX,go+rX \
            /opt/simple-bank

          echo "Backend deployment directory prepared:"
          ls -ld /opt/simple-bank
          ls -ld /opt/simple-bank/backend
          EOF

      - name: Sync Backend Files
        shell: bash
        run: |
          set -e

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            --exclude ".env" \
            app/backend/ \
            backend:/opt/simple-bank/backend/

      - name: Verify Backend Files
        shell: bash
        run: |
          set -e

          ssh backend <<'EOF'
          set -e

          cd /opt/simple-bank/backend

          echo "Backend deployment path:"
          pwd

          echo "Backend files:"
          ls -la

          test -f Dockerfile
          test -f docker-compose.yml
          test -f app.py
          test -f requirements.txt
          EOF

      - name: Deploy Backend
        shell: bash
        run: |
          set -e

          ssh backend <<'EOF'
          set -e

          cd /opt/simple-bank/backend

          echo "Stopping existing backend container..."
          docker compose down || true

          echo "Building and starting backend..."
          docker compose up -d --build

          echo "Backend container status:"
          docker compose ps

          echo "Backend container logs:"
          docker compose logs --tail=50
          EOF

      - name: Backend Internal Health Check
        shell: bash
        run: |
          set -e

          ssh backend <<'EOF'
          set -e

          echo "Waiting for backend application..."
          sleep 10

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 10 \
            --retry-delay 5 \
            --retry-connrefused \
            http://127.0.0.1:5000/api/health

          echo
          echo "Backend internal health check passed."
          EOF

      - name: Public Health Check
        shell: bash
        run: |
          set -e

          echo "Waiting for public application..."
          sleep 15

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 10 \
            --retry-delay 5 \
            --retry-connrefused \
            https://dev.simplebankgcp.biharibabu.info/api/health

          echo
          echo "DEV deployment completed successfully."
