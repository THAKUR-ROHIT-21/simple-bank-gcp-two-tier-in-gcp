name: Deploy DEV

on:
  push:
    branches:
      - dev

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.DEV_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/github_actions_dev
          chmod 600 ~/.ssh/github_actions_dev

          ssh-keyscan -H ${{ secrets.DEV_FRONTEND_HOST }} >> ~/.ssh/known_hosts

          cat <<EOF >> ~/.ssh/config
          Host frontend
            HostName ${{ secrets.DEV_FRONTEND_HOST }}
            User ${{ secrets.DEV_SSH_USER }}
            IdentityFile ~/.ssh/github_actions_dev
            IdentitiesOnly yes

          Host backend
            HostName ${{ secrets.DEV_BACKEND_HOST }}
            User ${{ secrets.DEV_SSH_USER }}
            ProxyJump frontend
            IdentityFile ~/.ssh/github_actions_dev
            IdentitiesOnly yes
          EOF

          chmod 600 ~/.ssh/config

      - name: Test Frontend SSH
        run: |
          ssh frontend "hostname"

      - name: Test Backend SSH
        run: |
          ssh backend "hostname"

      ####################################################
      # Deploy Frontend
      ####################################################

      - name: Sync Frontend Files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            frontend/ \
            frontend:/home/rohit/simple-bank-dev/frontend/

      - name: Restart Frontend
        run: |
          ssh frontend << 'EOF'
          set -e

          cd /home/rohit/simple-bank-dev/frontend

          docker compose down || true
          docker compose up -d --build

          docker ps
          EOF

      ####################################################
      # Deploy Backend
      ####################################################

      - name: Sync Backend Files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            -e "ssh -J ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_FRONTEND_HOST }} -i ~/.ssh/github_actions_dev -o IdentitiesOnly=yes" \
            backend/ \
            ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_BACKEND_HOST }}:/opt/simple-bank/backend/

      - name: Restart Backend
        run: |
          ssh backend << 'EOF'
          set -e

          cd /opt/simple-bank/backend

          docker compose down || true
          docker compose up -d --build

          docker ps
          EOF

      ####################################################
      # Health Check
      ####################################################

      - name: Health Check
        run: |
          sleep 20
          curl -f https://dev.simplebankgcp.biharibabu.info/api/health
