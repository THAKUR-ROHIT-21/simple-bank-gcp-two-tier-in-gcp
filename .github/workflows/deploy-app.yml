name: Deploy Simple Bank Application

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: simple-bank-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
      BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      GCP_SSH_KEY_B64: ${{ secrets.GCP_SSH_KEY_B64 }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            FRONTEND_HOST \
            BACKEND_PRIVATE_IP \
            SSH_USER \
            GCP_SSH_KEY_B64 \
            MONGO_URI \
            MONGO_DB_NAME
          do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: ${name} is empty"
              exit 1
            fi
          done

          echo "All required secrets are available"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s' "$GCP_SSH_KEY_B64" \
            | tr -d '\r\n ' \
            | base64 --decode \
            > "$HOME/.ssh/simple-bank-gcp"

          chmod 600 "$HOME/.ssh/simple-bank-gcp"

          ssh-keygen -y \
            -f "$HOME/.ssh/simple-bank-gcp" \
            > /dev/null

          cat > "$HOME/.ssh/config" <<EOF
          Host frontend
              HostName ${FRONTEND_HOST}
              User ${SSH_USER}
              IdentityFile ${HOME}/.ssh/simple-bank-gcp
              IdentitiesOnly yes
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ConnectTimeout 20
              ServerAliveInterval 30
              ServerAliveCountMax 3

          Host backend
              HostName ${BACKEND_PRIVATE_IP}
              User ${SSH_USER}
              IdentityFile ${HOME}/.ssh/simple-bank-gcp
              IdentitiesOnly yes
              ProxyJump frontend
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ConnectTimeout 20
              ServerAliveInterval 30
              ServerAliveCountMax 3
          EOF

          chmod 600 "$HOME/.ssh/config"

          echo "SSH configuration completed"

      - name: Test SSH
        shell: bash
        run: |
          set -euo pipefail

          ssh frontend "echo 'Frontend SSH OK'"
          ssh backend "echo 'Backend SSH OK'"

      - name: Prepare deployment directories
        shell: bash
        run: |
          set -euo pipefail

          ssh frontend '
            mkdir -p /opt/simple-bank/frontend
            test -w /opt/simple-bank/frontend
          '

          ssh backend '
            mkdir -p /opt/simple-bank/backend
            test -w /opt/simple-bank/backend
          '

      - name: Upload and deploy backend
        shell: bash
        run: |
          set -euo pipefail

          rsync -az --delete \
            --exclude ".env" \
            -e ssh \
            app/backend/ \
            backend:/opt/simple-bank/backend/

          {
            printf 'MONGO_URI=%s\n' "$MONGO_URI"
            printf 'MONGO_DB_NAME=%s\n' "$MONGO_DB_NAME"
            printf 'PORT=5000\n'
          } > /tmp/backend.env

          chmod 600 /tmp/backend.env

          scp /tmp/backend.env \
            backend:/opt/simple-bank/backend/.env

          rm -f /tmp/backend.env

          ssh backend '
            set -e

            cd /opt/simple-bank/backend

            docker compose up -d \
              --build \
              --remove-orphans

            docker compose ps
          '

      - name: Check backend
        shell: bash
        run: |
          set -euo pipefail

          ssh backend '
            set -e

            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:5000/api/health; then
                echo
                echo "Backend health check successful"
                exit 0
              fi

              echo "Waiting for backend: attempt ${i}/12"
              sleep 5
            done

            echo "Backend health check failed"

            cd /opt/simple-bank/backend
            docker compose ps
            docker compose logs --tail=100

            exit 1
          '

      - name: Upload and deploy frontend
        shell: bash
        run: |
          set -euo pipefail

          rsync -az --delete \
            --exclude ".env" \
            -e ssh \
            app/frontend/ \
            frontend:/opt/simple-bank/frontend/

          printf 'BACKEND_PRIVATE_IP=%s\n' \
            "$BACKEND_PRIVATE_IP" \
            > /tmp/frontend.env

          chmod 600 /tmp/frontend.env

          scp /tmp/frontend.env \
            frontend:/opt/simple-bank/frontend/.env

          rm -f /tmp/frontend.env

          ssh frontend '
            set -e

            cd /opt/simple-bank/frontend

            docker compose up -d \
              --build \
              --remove-orphans

            docker compose ps
          '

      - name: End-to-end health check
        shell: bash
        run: |
          set -euo pipefail

          for i in $(seq 1 12); do
            if curl -fsS \
              --connect-timeout 10 \
              "http://${FRONTEND_HOST}/api/health"
            then
              echo
              echo "Deployment successful"
              echo "Application URL: http://${FRONTEND_HOST}"
              exit 0
            fi

            echo "Waiting for frontend: attempt ${i}/12"
            sleep 5
          done

          echo "End-to-end health check failed"

          ssh frontend '
            cd /opt/simple-bank/frontend
            docker compose ps
            docker compose logs --tail=100
          '

          exit 1

      - name: Clean temporary SSH files
        if: always()
        shell: bash
        run: |
          rm -f /tmp/backend.env
          rm -f /tmp/frontend.env
          rm -f "$HOME/.ssh/simple-bank-gcp"
